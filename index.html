<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hey, I'm Katerina</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lato', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f1ed 0%, #e8ddd5 100%);
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            filter: brightness(0.7);
            z-index: 0;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
            max-width: 600px;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tagline {
            color: rgba(255, 255, 255, 0.8);
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 30px;
            animation: fadeInUp 0.8s ease-out 0.1s both;
        }

        h1 {
            font-family: 'Merriweather', serif;
            color: white;
            font-size: clamp(40px, 10vw, 72px);
            font-weight: 700;
            margin-bottom: 50px;
            line-height: 1.2;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: fadeInUp 0.8s ease-out 0.3s both;
        }

        @media (min-width: 640px) {
            .buttons {
                flex-direction: row;
                justify-content: center;
                gap: 20px;
            }
        }

        a {
            text-decoration: none;
            flex: 1;
            min-width: 200px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            font-family: 'Lato', sans-serif;
        }

        .btn-primary {
            background: white;
            color: #8B6F47;
        }

        .btn-primary:hover {
            background: #f5f5f5;
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: white;
            color: #8B6F47;
            border: 2px solid white;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .btn-secondary:active {
            transform: scale(0.98);
        }

        .icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 36px;
            }

            .tagline {
                font-size: 16px;
            }

            .btn {
                padding: 16px 24px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="background"></div>
        <div class="overlay"></div>
        
        <div class="content">
            <p class="tagline">I like it when you look so closely</p>
            <h1>Hey, I'm Katerina</h1>
            
            <div class="buttons">
                <a href="https://www.patreon.com/kkaterina_kos?utm_campaign=creatorshare_creator" target="_blank">
                    <button class="btn btn-primary">
                        <span class="icon"><img src="patreon-logo.png" alt="Patreon"></span>
                        GET CLOSER
                    </button>
                </a>
                
                <a href="https://t.me/hey_im_katerina" target="_blank">
                    <button class="btn btn-primary">
                        <span class="icon"><img src="telegram-logo.png" alt="Telegram"></span>
                        TG channel
                    </button>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
